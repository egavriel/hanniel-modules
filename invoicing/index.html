<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Christmas Invoice Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Karla:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="master_data.js"></script>
</head>

<body
    class="bg-gray-100 min-h-screen flex flex-col xl:flex-row items-start xl:items-center justify-center p-2 md:p-4 gap-4">

    <!-- Controls Section -->
    <div class="relative w-full xl:fixed xl:top-4 xl:left-4 bg-white p-4 rounded shadow-lg z-50 md:w-64 mb-4 xl:mb-0">
        <h2 class="font-bold mb-2">Controls</h2>
        <div class="mb-4">
            <label class="block text-sm mb-1">Select Template</label>
            <select id="templateSelector" onchange="switchTemplate(this.value)"
                class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded w-full p-1 cursor-pointer">
                <option value="christmas">Christmas 2025</option>
                <option value="hanniel">Little Hanniel</option>
            </select>
        </div>
        <div class="mb-4">
            <label class="block text-sm mb-1">Add Item Row</label>
            <button onclick="addItemRow()"
                class="active:scale-95 transition-transform bg-amber-700 text-white text-sm px-3 py-1 rounded w-full">Add
                Row</button>
        </div>
        <button onclick="generateInvoice()"
            class="active:scale-95 transition-transform bg-green-700 text-white font-bold py-2 px-4 rounded w-full">Generate
            Invoice</button>
        <div class="mt-4">
            <label class="block text-sm mb-1">Special Discount</label>
            <select id="specialDiscount" onchange="calculateGrandTotal(); toggleDiscountRow()"
                class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded w-full p-1 cursor-pointer">
                <option value="0">NONE</option>
                <option value="0.05">5%</option>
                <option value="0.10">10%</option>
                <option value="0.20">20%</option>
            </select>
        </div>
    </div>
